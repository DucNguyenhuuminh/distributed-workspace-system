version: '3.9'
services:
  mongodb:
    image: mongo:7                          
    container_name: workspace-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: adminducbon
      MONGO_INITDB_ROOT_PASSWORD: Adminducbon1@3
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:                                    
    image: redis:7-alpine
    container_name: workspace-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  kafka:                                    
    image: bitnami/kafka:latest
    container_name: workspace-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
    volumes:
      - kafka_data:/bitnami/kafka

  minio:
    image: minio/minio:latest
    container_name: workspace-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: adminducbon
      MINIO_ROOT_PASSWORD: Adminducbon1@3
    volumes:
      - minio_data:/data

  elasticsearch:
    image: elasticsearch:8.12.0             
    container_name: workspace-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

volumes:
  mongo_data:
  minio_data:
  kafka_data:
  es_data: